{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}E-com{% endblock %}</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom styles -->
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand" href="{% url 'products:home' %}">E-com</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample"
        aria-controls="navbarsExample" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarsExample">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{% url 'products:list' %}">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'cart:detail' %}">Cart</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'checkout:index' %}">Checkout</a></li>
        </ul>
        <form class="d-flex" method="get" action="{% url 'products:list' %}">
          <input class="form-control me-2" name="name" placeholder="Search products..."
            value="{{ request.GET.name|default:'' }}">
          <button class="btn btn-light" type="submit">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    {% block messages %}
    {% if messages %}
    <div class="mt-2">
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% endblock %}

    {% block content %}{% endblock %}
  </main>

  <footer class="bg-white border-top py-3">
    <div class="container text-center small text-muted">
      &copy; {% now "Y" %} E-com · Built with Django
    </div>
  </footer>

  <!-- Bootstrap JS (bundle includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
