{% extends 'products/base.html' %}

{% load crispy_forms_tags %}

{% block content %}

<div class="container my-5">
	<h2 class="my-5">Featured Products</h2>
	<div class="row">
		<div class="col-md-3">
			<form method="get" action="{% url 'products:list' %}">
				<div class="mb-3">
					<label class="form-label">Name</label>
					{{ filter.form.name }}
				</div>
				<div class="mb-3">
					<label class="form-label">Price range</label>
					{{ filter.form.price }}
				</div>
				<button type="submit" class="btn btn-primary w-100">Apply Filters</button>
			</form>
		</div>
		<div class="col-md-9">
			<div class="row">
				{% for product in filter.qs %}
				<div class="col-md-6 col-sm-12 col-lg-4">
					<figure class="card card-product">
						<div class="img-wrap">
							{% if product.mainimage %}
							<img src="{{ product.mainimage.url }}" style="width: 100%; height: 300px; object-fit: cover;">
							{% else %}
							<div class="d-flex align-items-center justify-content-center bg-light" style="width: 100%; height: 300px;">
								<span class="text-muted">No image</span>
							</div>
							{% endif %}
						</div>
						<figcaption class="info-wrap">
							<h6 class="title text-dots"><a href="{{ product.get_absolute_url }}">{{ product.name }}</a>
							</h6>

							<div class="action-wrap">
								<div class="price-wrap h5">
									<span class="price-new">${{ product.price }}</span>
								</div>
							</div> <!-- action-wrap -->
						</figcaption>
					</figure> <!-- card // -->
				</div> <!-- col // -->
				{% empty %}
				<div class="col-12">
					<div class="alert alert-info">No products found.</div>
				</div>
				{% endfor %}
			</div>
		</div>
	</div>
</div>
{% endblock %}
